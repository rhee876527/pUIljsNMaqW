name: Update checksums

#on:
#  push:
#    branches: main
on:
  workflow_run:
    workflows: ['Auto update Kernel Version']
    types:
      - completed


jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.head_commit.message != 'Update PKGBUILD'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Keep PKGBUILD for processing based on updpkgsums result
        run: |
          mkdir -p original
          cp PKGBUILD original/PKGBUILD

      - name: Download pkgrel update artifact
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: new-kernel
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./

      - name: Validate patch availability for new minor versions
        run: |
          # Extract _major and _minor from PKGBUILD
          _major=$(grep '^_major=' PKGBUILD | cut -d'=' -f2)
          _minor=$(grep '^_minor=' PKGBUILD | cut -d'=' -f2)
          pkgver="${_major}.${_minor}"
          major_version=$(echo "$_major" | cut -d'.' -f1)

          # Only validate patch URL if patch level (_minor) is not 0
          if [[ "$_minor" != "0" ]]; then
              patch_url="https://cdn.kernel.org/pub/linux/kernel/v${major_version}.x/patch-${pkgver}.xz"
              echo "Checking patch availability at: $patch_url"

              status=$(curl -s -o /dev/null -w "%{http_code}" "$patch_url")
              if [[ "$status" != "200" ]]; then
                  echo "Patch file not found (HTTP $status). Skipping pipeline."
                  echo "skip=true" >> $GITHUB_ENV
              else
                  echo "Patch verified successfully."
              fi
          else
              echo "Patch level is 0. Skipping patch validation."
          fi

      - name: Validate package
        if: env.skip != 'true'
        uses: docker://ghcr.io/rhee876527/archlinux-package-action:edge
        with:
          flags: ''
          namcap: false
          updpkgsums: true


      - name: Drop pipeline if only archlinux config has changed
        run: |
          # Check if patch validation skipped the pipeline
          if [[ "${{ env.skip }}" == "true" ]]; then
              echo "Skipping pipeline due to patch url unavailability."
              exit 0
          fi

          # Check for last-source-only checksum update and fail if detected
          diff_output=$(diff -u original/PKGBUILD PKGBUILD || true)

          # Allow force pushes to bypass config check
          commit_msg="${{ github.event.workflow_run.head_commit.message }}"
          if echo "$commit_msg" | grep -qi "force"; then
              echo "Force push detected. Bypassing relevant config changes check."
              echo "push_changes=true" >> $GITHUB_ENV
              exit 0
          fi

          awk_program='
          # Count only real diff +/- lines
          /^[+-][^+-]/ { total_changes++ }

          /^         '\''/ || /^[+-][^+-]        '\''/ {
              if (!in_b2sums_hunk) {
                  in_b2sums_hunk = 1;
                  minus_count = 0;
                  plus_count = 0;
                  last_minus = ""
              }
          }
          in_b2sums_hunk && /^-[^-]/ {
              minus_count++;
              last_minus = $0
          }
          in_b2sums_hunk && /^\+[^+]/ {
              plus_count++
          }
          /^@@/ || /diff --git/ {
              if (in_b2sums_hunk && minus_count == 1 && plus_count == 1 && last_minus ~ /\)$/ && total_changes == 2) {
                  print "skip"
              }
              in_b2sums_hunk = 0
          }
          END {
              if (in_b2sums_hunk && minus_count == 1 && plus_count == 1 && last_minus ~ /\)$/ && total_changes == 2) {
                  print "skip"
              }
          }
          '

          if [[ -z "$diff_output" ]]; then
            echo "No changes in PKGBUILD!"
            exit 0
          fi

          result=$(echo "$diff_output" | awk "$awk_program")

          if [[ "$result" == "skip" ]]; then
              echo "Only Arch config changed. Skipping subsequent steps."
              exit 0
          fi

          echo "push_changes=true" >> $GITHUB_ENV
          echo "Relevant changes detected. Proceeding with pipeline."

      - name: Decision to bump pkgrel for PKGBUILD
        if: env.push_changes == 'true'
        run: |
          # Check if new kernel artifact exists
          if [[ ! -f "new-release-update.txt" ]]; then
              echo "Artifact missing. Checking for changes..."
              if [[ $push_changes == "true" ]]; then
                  # Bump pkgrel for the root PKGBUILD
                  current_pkgrel=$(grep '^pkgrel=' PKGBUILD | cut -d'=' -f2)
                  next_pkgrel=$((current_pkgrel + 1))
                  sed -i "s/^pkgrel=.*/pkgrel=$next_pkgrel/" PKGBUILD

                  # Bump pkgrel for the processed PKGBUILD
                  current_pkgrel_processed=$(grep '^pkgrel=' processed/PKGBUILD | cut -d'=' -f2)
                  next_pkgrel_processed=$((current_pkgrel_processed + 1))
                  sed -i "s/^pkgrel=.*/pkgrel=$next_pkgrel_processed/" processed/PKGBUILD

                  echo "Auto bumped pkgrel!"
              else
                  echo "Bumping pkgrel not needed."
                  exit 0
              fi
          else
              echo "Artifact found. Skipping pkgrel bump."
          fi

      - name: Skip obs update artifact
        if: ${{ env.push_changes != 'true' }}
        run: echo "skip=true" > skip-obs-update.txt

      - name: Avail skip obs update artifact
        if: ${{ env.push_changes != 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: skip-obs-update
          path: skip-obs-update.txt

      - name: Commit and push changes
        if: env.push_changes == 'true'
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          cp $GITHUB_WORKSPACE/PKGBUILD $GITHUB_WORKSPACE/processed/
          git add $GITHUB_WORKSPACE/processed/PKGBUILD PKGBUILD
          git commit -m "Update PKGBUILD"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
